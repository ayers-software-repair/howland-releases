name: Bug report
description: Something in Howland is broken.
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. 1.0.0"
  - type: dropdown
    id: system
    attributes:
      label: System
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
